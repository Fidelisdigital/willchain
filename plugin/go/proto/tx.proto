syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";
import "google/protobuf/any.proto";

message Transaction {
  string message_type = 1; // @gotags: json:"messageType"
  google.protobuf.Any msg = 2;
  Signature signature = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  uint64 time = 5;
  uint64 fee = 6;
  string memo = 7;
  uint64 network_id = 8; // @gotags: json:"networkID"
  uint64 chain_id = 9; // @gotags: json:"chainID"
}

message MessageSend {
  bytes from_address = 1; // @gotags: json:"fromAddress"
  bytes to_address = 2; // @gotags: json:"toAddress"
  uint64 amount = 3;
}

message FeeParams {
  uint64 send_fee = 1; // @gotags: json:"sendFee"
}

message Signature {
  bytes public_key = 1; // @gotags: json:"publicKey"
  bytes signature = 2;
}

message MessageCreateWill {
  bytes  owner_address       = 1;
  bytes  beneficiary_address = 2;
  uint64 amount              = 3;
  uint64 claim_after_blocks  = 4;
  string message             = 5;
}

message MessageResetTimer {
  bytes  owner_address = 1;
  uint64 will_id       = 2;
}

message MessageClaimWill {
  bytes  beneficiary_address = 1;
  uint64 will_id             = 2;
}

message MessageCancelWill {
  bytes  owner_address = 1;
  uint64 will_id       = 2;
}

message Will {
  uint64 id                  = 1;
  bytes  owner_address       = 2;
  bytes  beneficiary_address = 3;
  uint64 amount              = 4;
  uint64 claim_after_height  = 5;
  uint64 original_blocks     = 6;
  string message             = 7;
  uint64 created_height      = 8;
  bool   is_active           = 9;
}

message WillCounter {
  uint64 count = 1;
}